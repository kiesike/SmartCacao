
services:

  app:
    build: .
    container_name: smartcacao_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - quizzard

  nginx:
    image: nginx:latest
    container_name: smartcacao_nginx
    ports:
      - "9000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - quizzard

  mysql:
    image: mysql:8.0
    container_name: smartcacao_mysql
    restart: always
    environment:
      MYSQL_DATABASE: quizzard_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: quizzard_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - quizzard

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smartcacao_phpmyadmin
    ports:
      - "9001:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - quizzard

networks:
  quizzard:

volumes:
  mysql_data: